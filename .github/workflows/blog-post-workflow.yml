name: Latest blog posts

# Pulls the newest posts from the portfolio RSS feed and writes them into the
# README between the BLOG-POST-LIST markers. Runs on a schedule and on demand.

on:
  schedule:
    - cron: "0 */6 * * *" # every 6 hours
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-readme:
    runs-on: ubuntu-latest
    steps:
      - name: Pull posts into README
        uses: gautamkrishnar/blog-post-workflow@v1
        with:
          feed_list: "https://dafagareth.dev/rss.xml"
          max_post_count: 5
          template: "- [$title]($url) <sub>$date</sub>$newline"
